# Netlify deploy ayarları (Cloudflare Pages kullanırsan bu dosyaya gerek yok;
# orada build komutu "npm run build", output dizini "dist" girilir).
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Astro 404 sayfası
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
